version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      CORS_ORIGINS: http://localhost:5173
      REDIS_URL: redis://redis:6379/0
      INFERENCE_QUEUE_NAME: inference
      INFERENCE_MODEL_VERSION: mock-medgemma-0.1
      INFERENCE_JOB_TIMEOUT: "600"
      INFERENCE_RESULT_TTL: "3600"
    depends_on:
      - db
      - redis
      - orthanc

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      REDIS_URL: redis://redis:6379/0
      INFERENCE_QUEUE_NAME: inference
      INFERENCE_MODEL_VERSION: mock-medgemma-0.1
      INFERENCE_JOB_TIMEOUT: "600"
      INFERENCE_RESULT_TTL: "3600"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: .
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_ASR_ENDPOINT: /api/v1/reports/asr-transcript
      VITE_QA_CHECK_URL: /api/v1/reports/qa-check
      VITE_AUDIT_LOG_URL: /api/v1/audit-log
      VITE_DICOM_WEB_URL: http://localhost:8042/dicom-web
      VITE_DICOM_WEB_USERNAME: orthanc
      VITE_DICOM_WEB_PASSWORD: orthanc
      VITE_USE_MOCK_QUEUE: "false"
    depends_on:
      - backend
      - orthanc

  orthanc:
    image: jodogne/orthanc-plugins
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - orthanc-data:/var/lib/orthanc/db
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    environment:
      ORTHANC_USERNAME: orthanc
      ORTHANC_PASSWORD: orthanc

  orthanc-seeder:
    image: curlimages/curl:8.6.0
    depends_on:
      - orthanc
    volumes:
      - ./orthanc/seed.sh:/seed/seed.sh:ro
    environment:
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_USERNAME: orthanc
      ORTHANC_PASSWORD: orthanc
      ORTHANC_SEED_ENABLED: "true"
    entrypoint: ["/bin/sh", "/seed/seed.sh"]

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  orthanc-data:
  postgres-data:
