version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      - db

  frontend:
    build:
      context: .
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_ASR_ENDPOINT: /api/v1/reports/asr-transcript
      VITE_QA_CHECK_URL: /api/v1/reports/qa-check
      VITE_AUDIT_LOG_URL: /api/v1/audit-log
      VITE_DICOM_WEB_URL: http://localhost:8042/dicom-web
      VITE_USE_MOCK_QUEUE: "true"
    depends_on:
      - backend

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
