services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      CORS_ORIGINS: http://localhost:5173
      REDIS_URL: redis://redis:6379/0
      INFERENCE_QUEUE_NAME: inference
      INFERENCE_MODEL_VERSION: medgemma-radiology
      INFERENCE_JOB_TIMEOUT: "600"
      INFERENCE_RESULT_TTL: "3600"
      PROMPT_CONFIG_ENABLED: "true"
      VLLM_ENABLED: "false"
      VLLM_BASE_URL: http://vllm-medgemma:8000/v1
      VLLM_MODEL_NAME: medgemma-radiology
      VLLM_REQUEST_TIMEOUT: "120"
      VLLM_FALLBACK_TO_MOCK: "true"
      VLLM_DEFAULT_CONFIDENCE: "0.0"
      VLLM_MAX_TOKENS: "4096"
      VLLM_GUIDED_JSON: "true"
      MEDASR_ENABLED: "true"
      MEDASR_BASE_URL: http://medasr:8001
      MEDASR_TRANSCRIBE_PATH: /v1/audio/transcriptions
      MEDASR_MODEL: google/medasr
      MEDASR_REQUEST_TIMEOUT: "120"
      MEDASR_FALLBACK_TO_MOCK: "false"
      MEDASR_DEFAULT_CONFIDENCE: "0.0"
      DICOM_WEB_BASE_URL: http://orthanc:8042/dicom-web
      DICOM_WEB_USERNAME: orthanc
      DICOM_WEB_PASSWORD: orthanc
      DRIFT_SCHEDULE_HOURS: "24"
      DRIFT_WINDOW_DAYS: "7"
      DRIFT_BASELINE_DAYS: "7"
      SEGMENTER_URL: http://segmenter:8200
      SEGMENTATION_DATA_DIR: /data/segmentations
      SEGMENTATION_JOB_TIMEOUT: "1800"
    volumes:
      - seg-data:/data/segmentations
    depends_on:
      - db
      - redis
      - orthanc

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      REDIS_URL: redis://redis:6379/0
      INFERENCE_QUEUE_NAME: inference
      INFERENCE_MODEL_VERSION: medgemma-radiology
      INFERENCE_JOB_TIMEOUT: "600"
      INFERENCE_RESULT_TTL: "3600"
      PROMPT_CONFIG_ENABLED: "true"
      VLLM_ENABLED: "false"
      VLLM_BASE_URL: http://vllm-medgemma:8000/v1
      VLLM_MODEL_NAME: medgemma-radiology
      VLLM_REQUEST_TIMEOUT: "120"
      VLLM_FALLBACK_TO_MOCK: "true"
      VLLM_DEFAULT_CONFIDENCE: "0.0"
      VLLM_MAX_TOKENS: "4096"
      VLLM_GUIDED_JSON: "true"
      MEDASR_ENABLED: "true"
      MEDASR_BASE_URL: http://medasr:8001
      MEDASR_TRANSCRIBE_PATH: /v1/audio/transcriptions
      MEDASR_MODEL: google/medasr
      MEDASR_REQUEST_TIMEOUT: "120"
      MEDASR_FALLBACK_TO_MOCK: "false"
      MEDASR_DEFAULT_CONFIDENCE: "0.0"
      DICOM_WEB_BASE_URL: http://orthanc:8042/dicom-web
      DICOM_WEB_USERNAME: orthanc
      DICOM_WEB_PASSWORD: orthanc
      SEGMENTER_URL: http://segmenter:8200
      SEGMENTATION_DATA_DIR: /data/segmentations
      SEGMENTATION_JOB_TIMEOUT: "1800"
    volumes:
      - seg-data:/data/segmentations
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      # Browser URLs (accessed from host machine)
      VITE_API_BASE_URL: ""
      VITE_WS_URL: ""
      # Vite proxy targets (accessed from within Docker network)
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_DICOM_WEB_PROXY_TARGET: http://orthanc:8042
      # API endpoints (relative, go through proxy)
      VITE_ASR_ENDPOINT: /api/v1/reports/asr-transcript
      VITE_QA_CHECK_URL: /api/v1/reports/qa-check
      VITE_AUDIT_LOG_URL: /api/v1/audit-log
      VITE_DICOM_WEB_URL: /dicom-web
      VITE_DICOM_WEB_USERNAME: orthanc
      VITE_DICOM_WEB_PASSWORD: orthanc
      VITE_USE_MOCK_QUEUE: "false"
    depends_on:
      - backend
      - orthanc

  orthanc:
    image: jodogne/orthanc-plugins
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - orthanc-data:/var/lib/orthanc/db
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    environment:
      ORTHANC_USERNAME: orthanc
      ORTHANC_PASSWORD: orthanc
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8042/system"]
      interval: 30s
      timeout: 10s
      retries: 3

  orthanc-seeder:
    image: curlimages/curl:8.6.0
    depends_on:
      - orthanc
    volumes:
      - ./orthanc/seed.sh:/seed/seed.sh:ro
    environment:
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_USERNAME: orthanc
      ORTHANC_PASSWORD: orthanc
      ORTHANC_SEED_ENABLED: "true"
      # Seed modes: minimal, mri, ct, multiframe, us, rg, compression, color, full
      ORTHANC_SEED_MODE: "full"
    entrypoint: ["/bin/sh", "/seed/seed.sh"]

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 15s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3

  vllm-medgemma:
    image: vllm/vllm-openai:nightly
    pull_policy: always
    profiles: ["gpu"]
    gpus: all
    ports:
      - "8002:8000"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      VLLM_LOGGING_LEVEL: INFO
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-${HF_TOKEN:-}}
      HF_TOKEN: ${HF_TOKEN:-${HUGGINGFACE_HUB_TOKEN:-}}
    volumes:
      - vllm-cache:/root/.cache/huggingface
    entrypoint: ["vllm"]
    command:
      - serve
      - google/medgemma-1.5-4b-it
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --dtype
      - bfloat16
      - --max-model-len
      - "32768"
      - --max-num-seqs
      - "4"
      - --gpu-memory-utilization
      - "0.90"
      - --trust-remote-code
      - --served-model-name
      - medgemma-radiology
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,json; r=urllib.request.urlopen('http://localhost:8000/v1/models'); json.loads(r.read())"]
      interval: 30s
      timeout: 10s
      retries: 3

  medasr:
    image: vllm/vllm-openai:nightly
    pull_policy: always
    profiles: ["gpu"]
    gpus: all
    ports:
      - "8003:8001"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      VLLM_LOGGING_LEVEL: INFO
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-${HF_TOKEN:-}}
      HF_TOKEN: ${HF_TOKEN:-${HUGGINGFACE_HUB_TOKEN:-}}
    volumes:
      - vllm-cache:/root/.cache/huggingface
    entrypoint: ["vllm"]
    command:
      - serve
      - google/medasr
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --dtype
      - float32
      - --max-model-len
      - "1024"
      - --gpu-memory-utilization
      - "0.15"
      - --served-model-name
      - medasr
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  segmenter:
    build:
      context: ./services/segmenter
    ports:
      - "8200:8200"
    environment:
      SEGMENTATION_DATA_DIR: /data/segmentations
      DICOM_WEB_BASE_URL: http://orthanc:8042/dicom-web
      DICOM_WEB_USERNAME: orthanc
      DICOM_WEB_PASSWORD: orthanc
      BONE_HU_THRESHOLD: "300"
      SEGMENTER_MAX_PARALLEL_WADO: "8"
    volumes:
      - seg-data:/data/segmentations
    depends_on:
      - orthanc
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  orthanc-data:
  postgres-data:
  vllm-cache:
  seg-data:
