services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      CORS_ORIGINS: http://localhost:5173
      REDIS_URL: redis://redis:6379/0
      INFERENCE_QUEUE_NAME: inference
      INFERENCE_MODEL_VERSION: medgemma-radiology
      INFERENCE_JOB_TIMEOUT: "600"
      INFERENCE_RESULT_TTL: "3600"
      VLLM_ENABLED: "false"
      VLLM_BASE_URL: http://vllm-medgemma:8000/v1
      VLLM_MODEL_NAME: medgemma-radiology
      VLLM_REQUEST_TIMEOUT: "120"
      VLLM_FALLBACK_TO_MOCK: "true"
      VLLM_DEFAULT_CONFIDENCE: "0.0"
      MEDASR_ENABLED: "false"
      MEDASR_BASE_URL: http://medasr:8001
      MEDASR_TRANSCRIBE_PATH: /v1/audio/transcriptions
      MEDASR_MODEL: google/medasr
      MEDASR_REQUEST_TIMEOUT: "120"
      MEDASR_FALLBACK_TO_MOCK: "true"
      MEDASR_DEFAULT_CONFIDENCE: "0.0"
    depends_on:
      - db
      - redis
      - orthanc

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://app:app@db:5432/app
      REDIS_URL: redis://redis:6379/0
      INFERENCE_QUEUE_NAME: inference
      INFERENCE_MODEL_VERSION: medgemma-radiology
      INFERENCE_JOB_TIMEOUT: "600"
      INFERENCE_RESULT_TTL: "3600"
      VLLM_ENABLED: "false"
      VLLM_BASE_URL: http://vllm-medgemma:8000/v1
      VLLM_MODEL_NAME: medgemma-radiology
      VLLM_REQUEST_TIMEOUT: "120"
      VLLM_FALLBACK_TO_MOCK: "true"
      VLLM_DEFAULT_CONFIDENCE: "0.0"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: .
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_ASR_ENDPOINT: /api/v1/reports/asr-transcript
      VITE_QA_CHECK_URL: /api/v1/reports/qa-check
      VITE_AUDIT_LOG_URL: /api/v1/audit-log
      VITE_DICOM_WEB_URL: /dicom-web
      VITE_DICOM_WEB_PROXY_TARGET: http://orthanc:8042
      VITE_DICOM_WEB_USERNAME: orthanc
      VITE_DICOM_WEB_PASSWORD: orthanc
      VITE_USE_MOCK_QUEUE: "false"
    depends_on:
      - backend
      - orthanc

  orthanc:
    image: jodogne/orthanc-plugins
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - orthanc-data:/var/lib/orthanc/db
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    environment:
      ORTHANC_USERNAME: orthanc
      ORTHANC_PASSWORD: orthanc

  orthanc-seeder:
    image: curlimages/curl:8.6.0
    depends_on:
      - orthanc
    volumes:
      - ./orthanc/seed.sh:/seed/seed.sh:ro
    environment:
      ORTHANC_URL: http://orthanc:8042
      ORTHANC_USERNAME: orthanc
      ORTHANC_PASSWORD: orthanc
      ORTHANC_SEED_ENABLED: "true"
    entrypoint: ["/bin/sh", "/seed/seed.sh"]

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  vllm-medgemma:
    image: vllm/vllm-openai:nightly
    pull_policy: always
    profiles: ["gpu"]
    runtime: nvidia
    ports:
      - "8002:8000"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      VLLM_LOGGING_LEVEL: INFO
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-${HF_TOKEN:-}}
      HF_TOKEN: ${HF_TOKEN:-${HUGGINGFACE_HUB_TOKEN:-}}
    volumes:
      - vllm-cache:/root/.cache/huggingface
    entrypoint: ["vllm"]
    command:
      - serve
      - google/medgemma-1.5-4b-it
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --dtype
      - bfloat16
      - --max-model-len
      - "4096"
      - --gpu-memory-utilization
      - "0.85"
      - --trust-remote-code
      - --enforce-eager
      - --served-model-name
      - medgemma-radiology
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  medasr:
    image: vllm/vllm-openai:nightly
    pull_policy: always
    profiles: ["gpu"]
    runtime: nvidia
    ports:
      - "8003:8001"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      VLLM_LOGGING_LEVEL: INFO
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-${HF_TOKEN:-}}
      HF_TOKEN: ${HF_TOKEN:-${HUGGINGFACE_HUB_TOKEN:-}}
    volumes:
      - vllm-cache:/root/.cache/huggingface
    entrypoint: ["vllm"]
    command:
      - serve
      - google/medasr
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --quantization
      - awq
      - --dtype
      - bfloat16
      - --max-model-len
      - "1024"
      - --served-model-name
      - medasr
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  orthanc-data:
  postgres-data:
  vllm-cache:
