site_name: Radiolyze
site_description: Radiologie-Workflow-System mit KI-gestützter Befunderstellung, DICOM Viewer und EU-AI-Act-konformem Audit-Logging.
site_url: https://radiolyze.github.io/radiolyze/
repo_url: https://github.com/radiolyze/radiolyze
repo_name: radiolyze/radiolyze
edit_uri: edit/main/docs/
copyright: "Copyright &copy; 2026 Radiolyze"

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Dark Mode aktivieren
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Light Mode aktivieren
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - fenced_code
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Architektur:
      - Übersicht: architecture/overview.md
      - Systemkontext: architecture/system-context.md
      - Frontend: architecture/frontend.md
      - Backend: architecture/backend.md
      - Datenfluss: architecture/data-flow.md
      - MedGemma Nutzung: architecture/medgemma-1-5-nutzung.md
      - Compliance-Architektur: architecture/compliance.md
      - Deployment: architecture/deployment.md
  - Komponenten:
      - DICOM Viewer: components/viewer.md
      - Reporting: components/reporting.md
      - UI Library: components/ui.md
  - API:
      - Übersicht: api/overview.md
      - Endpunkte: api/endpoints.md
      - Schemas: api/schemas.md
      - WebSocket: api/websocket.md
  - Workflows:
      - Übersicht: workflows/overview.md
      - Fast Reporting: workflows/fast-report.md
      - Komplexer Fall: workflows/complex-case.md
      - Batch Reporting: workflows/batch-reporting.md
  - Compliance:
      - Checkliste: compliance/checklist.md
      - Audit Logging: compliance/audit-logging.md
      - EU AI Act Mapping: compliance/eu-ai-act-mapping.md
      - Annex IV: compliance/annex-iv.md
  - Betrieb:
      - Runbook: operations/runbook.md
      - Security: operations/security.md
      - Internetnutzung: operations/internet-usage.md
      - Observability: operations/observability.md
  - Entwicklung:
      - Setup: development/setup.md
      - Contributing: development/contributing.md
      - Testing: development/testing.md
      - Styleguide: development/styleguide.md
      - i18n: development/i18n.md
      - Prompting: development/prompting.md
      - ADR-0001 Open Stack: decisions/adr-0001-open-stack.md
  - Roadmap:
      - Übersicht: roadmap.md
      - Validierung: roadmap-validation.md
  - Glossar: glossary.md
  - FAQ: faq.md
