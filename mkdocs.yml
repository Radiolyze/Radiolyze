site_name: Radiolyze
site_description: Radiology workflow system with AI-assisted report generation, DICOM viewer, and EU AI Act-compliant audit logging.
site_url: https://radiolyze.github.io/radiolyze/
repo_url: https://github.com/radiolyze/radiolyze
repo_name: radiolyze/radiolyze
edit_uri: edit/main/docs/
copyright: "Copyright &copy; 2026 Radiolyze"

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: de
          name: Deutsch
          build: true
          nav_translations:
            Home: Startseite
            Getting Started: Erste Schritte
            Overview: Übersicht
            Quickstart (5 min): Schnellstart (5 Min.)
            For Doctors: Für Ärzte
            Reporting Workflow: Befundungs-Workflow
            AI Guide: KI-Leitfaden
            Keyboard Shortcuts: Tastenkürzel
            Troubleshooting: Fehlerbehebung
            Fast Reporting: Fast Reporting
            Complex Cases: Komplexe Fälle
            Batch Reporting: Batch Reporting
            Administration: Administration
            Deployment Guide: Deployment-Leitfaden
            GPU Setup: GPU-Setup
            Security Hardening: Security-Hardening
            Backup & Recovery: Backup und Recovery
            For Researchers: Für Forscher
            MedGemma: MedGemma
            Model Switching: Modell-Wechsel
            Architecture: Architektur
            Overview: Übersicht
            System Context: Systemkontext
            Frontend: Frontend
            Backend: Backend
            Data Flow: Datenfluss
            MedGemma Usage: MedGemma Nutzung
            Compliance Architecture: Compliance-Architektur
            Deployment: Deployment
            Components: Komponenten
            DICOM Viewer: DICOM Viewer
            Reporting: Reporting
            UI Library: UI-Bibliothek
            3D Segmentation: 3D-Segmentierung
            API: API
            Endpoints: Endpunkte
            Schemas: Schemas
            WebSocket: WebSocket
            Workflows: Workflows
            Fast Reporting: Fast Reporting
            Complex Case: Komplexer Fall
            Batch Reporting: Batch Reporting
            Compliance: Compliance
            Checklist: Checkliste
            Evidence Overview: Nachweise-Übersicht
            Risk Management: Risikomanagement
            Data Protection: Datenschutz
            Audit Logging: Audit Logging
            EU AI Act Mapping: EU AI Act Mapping
            Annex IV: Annex IV
            Operations: Betrieb
            Runbook: Runbook
            Security: Security
            Internet Usage: Internetnutzung
            Observability: Observability
            Development: Entwicklung
            Setup: Setup
            Contributing: Contributing
            Testing: Testing
            Style Guide: Styleguide
            i18n: i18n
            Prompting: Prompting
            ASR Providers: ASR-Provider
            QA Rules: QA-Regeln
            ADR-0001 Open Stack: ADR-0001 Open Stack
            Roadmap: Roadmap
            Validation: Validierung
            Glossary: Glossar
            FAQ: FAQ

markdown_extensions:
  - admonition
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - fenced_code
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

